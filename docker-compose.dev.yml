version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: webiz-app-dev
    ports:
      - '3000:3000'
    environment:
      - NODE_ENV=development
      - PORT=3000
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      redis:
        condition: service_healthy
    command: yarn start:dev
    restart: unless-stopped
    networks:
      - webiz-network

  redis:
    image: redis:7-alpine
    container_name: webiz-redis-dev
    ports:
      - '6379:6379'
    volumes:
      - redis-data-dev:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    restart: unless-stopped
    networks:
      - webiz-network

volumes:
  redis-data-dev:

networks:
  webiz-network:
    driver: bridge
